# Development overrides — hot reload, debug ports, dev tools
# Usage: docker compose up (automatically applies this override)
# For production: docker compose -f docker-compose.yml up

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: builder
    command: npx tsx --watch src/index.ts
    volumes:
      - ./backend/src:/app/src:ro
    environment:
      NODE_ENV: development
      LOG_LEVEL: debug

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: builder
    command: npx vite --host 0.0.0.0 --port 3000
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.ts:/app/vite.config.ts:ro
    environment:
      NODE_ENV: development
      VITE_API_TARGET: http://backend:8080
